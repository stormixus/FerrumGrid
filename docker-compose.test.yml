services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ferrumgrid_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: ferrumgrid_test
    ports:
      - "15432:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrumgrid_test"]
      interval: 2s
      timeout: 5s
      retries: 10
