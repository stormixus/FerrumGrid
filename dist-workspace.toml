[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.28.7"
# CI backends to support
ci = "github"
# Allow manual tweaks (Node24 env block, etc.) to release.yml without
# 'dist host' failing the freshness check.
allow-dirty = ["ci"]
# The installers to generate for each app
installers = ["shell", "powershell", "msi"]
# Target platforms to build apps for (Rust target-triple syntax).
# aarch64-unknown-linux-gnu intentionally omitted: cross-compiling GTK3
# from x86 runners hits pkg-config sysroot pain that's not worth solving
# right now — ARM Linux users can build from source.
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

# macos-13 (x86 Mac runner) has long queues / restricted availability,
# so we route both Mac targets through macos-14 (Apple Silicon). x86_64
# is built via cross-compile (macOS needs no sysroot for that), aarch64
# is native.
[dist.github-custom-runners]
x86_64-apple-darwin = "macos-14"
aarch64-apple-darwin = "macos-14"

# Linux system dependencies for eframe / egui (GTK, XCB, xkb, OpenSSL).
[dist.dependencies.apt]
libgtk-3-dev = "*"
libxcb-render0-dev = "*"
libxcb-shape0-dev = "*"
libxcb-xfixes0-dev = "*"
libxkbcommon-dev = "*"
libssl-dev = "*"
