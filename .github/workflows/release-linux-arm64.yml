name: release-linux-arm64

on:
  # Keep this manual until the GTK3/aarch64 sysroot is packaged for cross.
  # The main cargo-dist release intentionally omits this target for now.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked
      - name: Build (aarch64-unknown-linux-gnu)
        run: cross build --release --target aarch64-unknown-linux-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrumgrid-linux-arm64
          path: target/aarch64-unknown-linux-gnu/release/ferrumgrid
