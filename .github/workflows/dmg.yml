name: macOS DMG

on:
  # GitHub does not fire `release: published` for releases created by the
  # default GITHUB_TOKEN (anti-recursion guard), and dist publishes via
  # exactly that token. Hook into release.yml's completion via
  # `workflow_run` and extract the tag from the upstream run.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package (e.g. v0.1.1)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-dmg:
    name: build-dmg (${{ matrix.target }})
    # Skip workflow_run firings that aren't a successful tag-triggered Release.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ -n "${{ github.event.workflow_run.head_branch }}" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)
          rm "$RUNNER_TEMP/cert.p12"
          IDENTITY_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY_HASH" ]; then
            echo "::error::No Developer ID Application identity found in imported certificate"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Download release tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ASSET=$(gh release view "$TAG" --json assets --jq ".assets[] | select(.name | endswith(\"$TARGET.tar.xz\")) | .name" | head -1)
          if [ -z "$ASSET" ]; then
            echo "::error::No tar.xz asset matching $TARGET on release $TAG"
            gh release view "$TAG" --json assets --jq '.assets[].name'
            exit 1
          fi
          echo "Downloading $ASSET"
          gh release download "$TAG" --pattern "$ASSET"
          mkdir extracted
          tar -C extracted -xf "$ASSET"
          BIN=$(find extracted -type f -perm +111 -name 'ferrumgrid' | head -1)
          if [ -z "$BIN" ]; then
            echo "::error::ferrumgrid binary not found in tarball"
            find extracted -type f
            exit 1
          fi
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Build .app bundle
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          APP="FerrumGrid.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/ferrumgrid"
          chmod +x "$APP/Contents/MacOS/ferrumgrid"
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>ferrumgrid</string>
            <key>CFBundleIdentifier</key><string>com.stormix.ferrumgrid</string>
            <key>CFBundleName</key><string>FerrumGrid</string>
            <key>CFBundleDisplayName</key><string>FerrumGrid</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleSignature</key><string>????</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          EOF
          echo "APP=$APP" >> "$GITHUB_ENV"

      - name: Codesign binary and .app
        run: |
          set -euo pipefail
          codesign --force --options runtime --timestamp --sign "$IDENTITY_HASH" "$APP/Contents/MacOS/ferrumgrid"
          codesign --force --options runtime --timestamp --sign "$IDENTITY_HASH" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build DMG
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          DMG="FerrumGrid-${VERSION}-${TARGET}.dmg"
          STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "FerrumGrid ${VERSION}" -srcfolder "$STAGING" -ov -format UDZO "$DMG"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Codesign DMG
        run: |
          codesign --force --sign "$IDENTITY_HASH" --timestamp "$DMG"

      - name: Notarize and staple
        env:
          NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARY_USER" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" "$DMG" --clobber
